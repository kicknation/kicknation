<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Team Stats</title>
  <style>
    body { font-family: Arial; background:#111; color:white; text-align:center; padding:20px; }
    .card { background:#1c1c1c; margin:15px auto; padding:20px; border-radius:10px; max-width:600px; }
    h1 { color:#00ff88; }
  </style>
</head>

<body>

<h1 id="teamName">Loading...</h1>
<p id="league">Loading...</p>

<div class="card">
  <h3>📊 Overview</h3>
  <p id="overview">Loading...</p>
</div>

<div class="card">
  <h3>⚽ Matches</h3>
  <p id="matches">Loading...</p>
</div>

<div class="card">
  <h3>🏆 Status</h3>
  <p id="status">Loading...</p>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const team = params.get("team");

const API_URL = "https://kicknation.vercel.app/api/matches";

async function loadTeam() {

  const res = await fetch(API_URL);
  const data = await res.json();

  const matches = data.matches || [];

  const teamMatches = matches.filter(m =>
    m.homeTeam.name.toLowerCase().includes(team) ||
    m.awayTeam.name.toLowerCase().includes(team)
  );

  document.getElementById("teamName").innerText = team.toUpperCase();

  document.getElementById("league").innerText =
    teamMatches[0]?.competition?.name || "Unknown";

  document.getElementById("overview").innerText =
    `Matches found: ${teamMatches.length}`;

  document.getElementById("matches").innerText =
    teamMatches.slice(0,3).map(m =>
      `${m.homeTeam.name} vs ${m.awayTeam.name}`
    ).join(" | ");

  document.getElementById("status").innerText =
    teamMatches[0]?.status || "No data";

}

loadTeam();

</script>

</body>
</html>
