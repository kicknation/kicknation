<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KickNation - Global Football</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h1>KickNation 🌍</h1>
</nav>

<div class="ticker">
  <p>🌍 Live global football data • All leagues • All competitions • KickNation</p>
</div>

<section class="hero">
  <h2>Global Football Dashboard ⚽</h2>
  <p>Live matches from around the world</p>
</section>

<!-- FILTER SECTION -->
<section class="features">

  <div class="card">
    <h3>🌍 Competition</h3>
    <select id="competitionSelect" onchange="loadMatches()">
      <option value="PL">Premier League</option>
      <option value="CL">Champions League</option>
      <option value="PD">La Liga</option>
      <option value="SA">Serie A</option>
      <option value="BL1">Bundesliga</option>
    </select>
  </div>

</section>

<!-- LIVE MATCH DISPLAY -->
<section class="live-score">

  <h2>🔴 Live / Fixtures</h2>

  <div class="score" id="matchDisplay">
    Loading matches...
  </div>

  <p id="competitionName"></p>

</section>

<script>

const API_KEY = "YOUR_API_KEY_HERE";

async function loadMatches() {

  const comp = document.getElementById("competitionSelect").value;

  try {

    const res = await fetch(
      `https://api.football-data.org/v4/competitions/${comp}/matches`,
      {
        headers: {
          "X-Auth-Token": API_KEY
        }
      }
    );

    const data = await res.json();

    if (!data.matches || data.matches.length === 0) {
      document.getElementById("matchDisplay").innerText =
        "No matches found";
      return;
    }

    const match = data.matches[0];

    document.getElementById("matchDisplay").innerText =
      match.homeTeam.name + " vs " + match.awayTeam.name;

    document.getElementById("competitionName").innerText =
      match.competition.name + " • " + match.status;

  } catch (err) {

    document.getElementById("matchDisplay").innerText =
      "API Error - Check Key or Limit";

    console.log(err);
  }
}

loadMatches();

</script>

</body>
</html>
