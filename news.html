<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KickNation News</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">
  <h2>Live Football News 📰</h2>
  <p>Live football updates, fixtures & competitions</p>
</section>

<section class="features">

  <div class="card">
    <h3>⚽ Match</h3>
    <p id="injury">Loading football updates...</p>
  </div>

  <div class="card">
    <h3>🏆 Competition</h3>
    <p id="ucl">Loading competitions...</p>
  </div>

  <div class="card">
    <h3>📅 Match Time</h3>
    <p id="worldcup">Loading kickoff time...</p>
  </div>

</section>

<script>

const fallbackMatches = [
  "Manchester City vs Arsenal",
  "Real Madrid vs Barcelona",
  "Liverpool vs Chelsea",
  "Bayern Munich vs Dortmund",
  "PSG vs Marseille"
];

const fallbackCompetitions = [
  "Premier League",
  "Champions League",
  "La Liga",
  "Serie A",
  "Bundesliga"
];

async function loadFootballData() {

  const injury = document.getElementById("injury");
  const ucl = document.getElementById("ucl");
  const worldcup = document.getElementById("worldcup");

  try {

    const response = await fetch("/.netlify/functions/football");

    if (!response.ok) {
      throw new Error("Backend not responding");
    }

    const data = await response.json();

    if (data.matches && data.matches.length > 0) {

      const match = data.matches[0];

      injury.innerText =
        match.homeTeam.name + " vs " + match.awayTeam.name;

      ucl.innerText =
        match.competition.name;

      worldcup.innerText =
        "Kickoff: " +
        new Date(match.utcDate).toLocaleString();

    } else {

      injury.innerText =
        fallbackMatches[Math.floor(Math.random() * fallbackMatches.length)];

      ucl.innerText =
        fallbackCompetitions[Math.floor(Math.random() * fallbackCompetitions.length)];

      worldcup.innerText =
        "More football updates coming soon";
    }

  } catch (error) {

    injury.innerText =
      fallbackMatches[Math.floor(Math.random() * fallbackMatches.length)];

    ucl.innerText =
      fallbackCompetitions[Math.floor(Math.random() * fallbackCompetitions.length)];

    worldcup.innerText =
      "Live football system active";

    console.log(error);
  }
}

loadFootballData();
setInterval(loadFootballData, 10000);

</script>

</body>
</html>
