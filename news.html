<script>
async function loadFootballData() {
  try {
    const res = await fetch("/.netlify/functions/football");
    const data = await res.json();

    if (!data.matches || data.matches.length === 0) {
      document.getElementById("ucl").innerText = "No live matches";
      document.getElementById("injury").innerText = "Check back later";
      document.getElementById("worldcup").innerText = "Waiting for updates";
      return;
    }

    const match = data.matches[0];

    document.getElementById("injury").innerText =
      match.homeTeam.name + " vs " + match.awayTeam.name;

    document.getElementById("ucl").innerText =
      match.competition.name;

    document.getElementById("worldcup").innerText =
      match.status;

  } catch (err) {
    document.getElementById("ucl").innerText = "Backend not working";
  }
}

loadFootballData();
setInterval(loadFootballData, 60000);
</script>
