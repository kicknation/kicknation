<!DOCTYPE html>
<html>
<head>
  <title>KickNation News</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<section class="hero">
  <h2>Live Football News 📰</h2>
  <p>Upcoming matches, competitions & football updates</p>
</section>

<section class="features">

  <div class="card">
    <h3>⚽ Match</h3>
    <p id="injury">Loading...</p>
  </div>

  <div class="card">
    <h3>🏆 Competition</h3>
    <p id="ucl">Loading...</p>
  </div>

  <div class="card">
    <h3>📅 Kickoff</h3>
    <p id="worldcup">Loading...</p>
  </div>

</section>

<script>
async function loadFootballData() {

  const injury = document.getElementById("injury");
  const ucl = document.getElementById("ucl");
  const worldcup = document.getElementById("worldcup");

  try {

    const response = await fetch("/.netlify/functions/football");

    if (!response.ok) {
      injury.innerText = "Backend not ready";
      ucl.innerText = "Deployment issue";
      worldcup.innerText = "Try again later";
      return;
    }

    const data = await response.json();

    if (!data.matches || data.matches.length === 0) {
      injury.innerText = "No upcoming matches";
      ucl.innerText = "Fixtures unavailable";
      worldcup.innerText = "Check back soon";
      return;
    }

    const match = data.matches[0];

    injury.innerText =
      match.homeTeam.name + " vs " + match.awayTeam.name;

    ucl.innerText =
      match.competition.name;

    worldcup.innerText =
      new Date(match.utcDate).toLocaleString();

  } catch (error) {

    injury.innerText = "Error loading data";
    ucl.innerText = "Backend issue";
    worldcup.innerText = "Please try later";

    console.log(error);
  }
}

loadFootballData();
</script>

</body>
</html>
