<!DOCTYPE html>
<html>
<head>
  <title>KickNation News</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">
  <h2>Live Football News 📰</h2>
  <p>Real-time updates on injuries, matches & tournaments</p>
</section>

<section class="features">

  <div class="card">
    <h3>⚠️ Latest Injury</h3>
    <p id="injury">Loading update...</p>
  </div>

  <div class="card">
    <h3>🏆 Champions League</h3>
    <p id="ucl">Loading update...</p>
  </div>

  <div class="card">
    <h3>🌍 World Cup</h3>
    <p id="worldcup">Loading update...</p>
  </div>

</section>

<script>
const API_KEY = "def27a3651524400ba3765f6c9cd7912";

async function loadFootballData() {
  try {
    const res = await fetch("https://api.football-data.org/v4/matches", {
      method: "GET",
      headers: {
        "X-Auth-Token": API_KEY
      }
    });

    const data = await res.json();

    if (!data.matches || data.matches.length === 0) {
      document.getElementById("ucl").innerText = "No live matches right now";
      return;
    }

    const match = data.matches[0];

    document.getElementById("injury").innerText =
      match.homeTeam.name + " vs " + match.awayTeam.name;

    document.getElementById("ucl").innerText =
      "Competition: " + match.competition.name;

    document.getElementById("worldcup").innerText =
      "Status: " + match.status;

  } catch (error) {
    document.getElementById("ucl").innerText =
      "Error loading data";
    console.log(error);
  }
}

loadFootballData();
setInterval(loadFootballData, 60000);
</script>

</body>
</html>
